apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-career-api
  labels:
    app: it-career-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: it-career-api
  template:
    metadata:
      labels:
        app: it-career-api
    spec:
      containers:
      - name: it-career-api
        image: ayushman50/it-career-api:latest
        ports:
        - containerPort: 8000
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: it-career-api-service
spec:
  selector:
    app: it-career-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
